<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>SOLID — Guía de referencia</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><defs><linearGradient id='g' x1='0' y1='0' x2='1' y2='1'><stop offset='0%' stop-color='%234f8cff'/><stop offset='25%' stop-color='%232fd6a0'/><stop offset='50%' stop-color='%23ff8a4c'/><stop offset='75%' stop-color='%23ff5c93'/><stop offset='100%' stop-color='%23a17bff'/></linearGradient></defs><rect width='32' height='32' rx='7' fill='url(%23g)'/><text x='16' y='23' text-anchor='middle' font-family='monospace' font-weight='700' font-size='20' fill='white'>S</text></svg>">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600;9..144,700&family=IBM+Plex+Mono:wght@400;500;600&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#131721;
    --bg-raised:#1b1f2b;
    --bg-raised-2:#212633;
    --grid-line:rgba(255,255,255,.04);
    --ink:#e9ecf3;
    --ink-soft:#a4afc0;
    --ink-faint:#5a667a;
    --line:rgba(255,255,255,.09);
    --line-strong:rgba(255,255,255,.16);
    --code-bg:#0d1117;
    --code-text:#cfd7e6;

    --syn-kw:#7ab8ff;
    --syn-str:#7ee6b6;
    --syn-cm:#5a667a;
    --syn-fn:#e2b87a;
    --syn-type:#69d5e8;
    --syn-num:#ff9e85;

    --S:#4f8cff; --S-soft:rgba(79,140,255,.14);
    --O:#2fd6a0; --O-soft:rgba(47,214,160,.14);
    --L:#ff8a4c; --L-soft:rgba(255,138,76,.14);
    --I:#ff5c93; --I-soft:rgba(255,92,147,.14);
    --D:#a17bff; --D-soft:rgba(161,123,255,.14);
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background:
      radial-gradient(circle at 1px 1px, var(--grid-line) 1px, transparent 0) 0 0/28px 28px,
      var(--bg);
    color:var(--ink);
    font-family:'Inter',system-ui,sans-serif;
    -webkit-font-smoothing:antialiased;
  }
  a{color:inherit;}
  ::selection{background:var(--S); color:#fff;}

  /* ---------- layout ---------- */
  .app{
    display:grid;
    grid-template-columns:270px 1fr;
    min-height:100vh;
  }
  @media (max-width:820px){
    .app{grid-template-columns:1fr;}
    .sidebar{position:static; height:auto; border-right:none; border-bottom:1px solid var(--line);}
  }

  /* ---------- sidebar ---------- */
  .sidebar{
    position:sticky; top:0; height:100vh; overflow-y:auto;
    border-right:1px solid var(--line);
    background:linear-gradient(180deg, rgba(255,255,255,.02), transparent 200px);
    padding:30px 22px;
    display:flex; flex-direction:column; gap:28px;
  }
  .brand-row{display:flex; align-items:center; gap:10px;}
  .brand-mark{
    width:34px; height:34px; border-radius:9px; flex-shrink:0;
    background:conic-gradient(from 200deg, var(--S), var(--O), var(--L), var(--I), var(--D), var(--S));
    display:flex; align-items:center; justify-content:center;
    position:relative;
  }
  .brand-mark::after{
    content:""; position:absolute; inset:3px; border-radius:6px; background:var(--bg);
  }
  .brand{
    font-family:'Fraunces',serif;
    font-size:24px; font-weight:700; letter-spacing:-0.01em;
    margin:0;
  }
  .brand-sub{
    font-family:'IBM Plex Mono',monospace;
    font-size:10.5px; color:var(--ink-faint); text-transform:uppercase; letter-spacing:.1em;
    margin:2px 0 0 44px;
  }
  .nav-group{display:flex; flex-direction:column; gap:4px;}
  .nav-label{
    font-family:'IBM Plex Mono',monospace; font-size:10px; letter-spacing:.12em;
    color:var(--ink-faint); text-transform:uppercase; margin:0 0 6px 12px;
  }
  .nav-item{
    display:flex; align-items:center; gap:11px;
    padding:10px 12px; border-radius:10px;
    cursor:pointer; border:1px solid transparent; background:transparent;
    font-family:'Inter',sans-serif; font-size:13.5px; color:var(--ink-soft);
    text-align:left; width:100%;
    transition:background .15s, border-color .15s;
    position:relative;
  }
  .nav-item:hover{background:rgba(255,255,255,.04);}
  .nav-item.active{
    background:var(--bg-raised-2); color:var(--ink);
    border-color:var(--accent-nav, var(--line-strong));
    box-shadow:inset 0 0 0 1px var(--accent-nav, var(--line-strong));
  }
  .nav-item.active::before{
    content:""; position:absolute; left:-22px; top:50%; transform:translateY(-50%);
    width:3px; height:18px; border-radius:2px; background:var(--accent-nav, var(--ink));
  }
  .nav-letter{
    font-family:'IBM Plex Mono',monospace; font-weight:600; font-size:13px;
    width:24px; height:24px; border-radius:7px;
    display:flex; align-items:center; justify-content:center;
    flex-shrink:0; border:1px solid var(--line);
    background:var(--bg-raised-2); color:var(--ink-faint);
  }
  .nav-item.active .nav-letter{color:#0b0e16; border-color:transparent;}
  .nav-item[data-key="S"] .nav-letter, .nav-item[data-key="S"].active{--accent-nav:var(--S);}
  .nav-item[data-key="S"].active .nav-letter{background:var(--S);}
  .nav-item[data-key="O"] .nav-letter, .nav-item[data-key="O"].active{--accent-nav:var(--O);}
  .nav-item[data-key="O"].active .nav-letter{background:var(--O);}
  .nav-item[data-key="L"] .nav-letter, .nav-item[data-key="L"].active{--accent-nav:var(--L);}
  .nav-item[data-key="L"].active .nav-letter{background:var(--L);}
  .nav-item[data-key="I"] .nav-letter, .nav-item[data-key="I"].active{--accent-nav:var(--I);}
  .nav-item[data-key="I"].active .nav-letter{background:var(--I);}
  .nav-item[data-key="D"] .nav-letter, .nav-item[data-key="D"].active{--accent-nav:var(--D);}
  .nav-item[data-key="D"].active .nav-letter{background:var(--D);}
  .nav-item[data-key="overview"].active .nav-letter{background:var(--ink); color:#0b0e16;}

  .sidebar-footer{
    margin-top:auto; padding-top:16px; border-top:1px solid var(--line);
    font-size:11.5px; color:var(--ink-faint); line-height:1.6;
    font-family:'IBM Plex Mono',monospace;
  }
  .sidebar-footer kbd{
    background:var(--bg-raised-2); border:1px solid var(--line); border-radius:4px;
    padding:1px 5px; font-size:10.5px;
  }

  /* ---------- main ---------- */
  main{padding:52px 60px 110px; max-width:840px;}
  @media (max-width:820px){ main{padding:34px 22px 80px;} }

  .view{display:none;}
  .view.active{display:block; animation:rise .4s cubic-bezier(.2,.8,.2,1) both;}
  @keyframes rise{from{opacity:0; transform:translateY(10px);} to{opacity:1; transform:none;}}

  /* overview */
  .hero-mark{
    display:flex; gap:12px; margin-bottom:34px; flex-wrap:wrap;
  }
  .hero-mark button{
    font-family:'IBM Plex Mono',monospace; font-weight:600;
    font-size:26px; width:60px; height:60px; border-radius:14px;
    display:flex; align-items:center; justify-content:center;
    color:#0b0e16; cursor:pointer; border:none;
    transition:transform .15s;
  }
  .hero-mark button:hover{transform:translateY(-3px);}
  .hero-mark button:nth-child(1){background:var(--S);}
  .hero-mark button:nth-child(2){background:var(--O);}
  .hero-mark button:nth-child(3){background:var(--L);}
  .hero-mark button:nth-child(4){background:var(--I);}
  .hero-mark button:nth-child(5){background:var(--D);}

  .eyebrow{
    font-family:'IBM Plex Mono',monospace; font-size:11px; letter-spacing:.14em; text-transform:uppercase;
    color:var(--ink-faint); margin:0 0 12px;
  }
  h1{font-family:'Fraunces',serif; font-size:42px; font-weight:700; line-height:1.12; margin:0 0 14px; letter-spacing:-0.015em;}
  .lede{font-size:16.5px; color:var(--ink-soft); line-height:1.75; max-width:62ch; margin:0 0 40px;}

  .schematic{width:100%; margin:0 0 40px; display:block;}

  .overview-grid{display:grid; grid-template-columns:1fr 1fr; gap:14px;}
  @media (max-width:600px){ .overview-grid{grid-template-columns:1fr;} }
  .ov-card{
    background:var(--bg-raised); border:1px solid var(--line); border-radius:14px;
    padding:20px 22px; cursor:pointer; transition:transform .15s, border-color .15s, box-shadow .15s;
    display:flex; gap:16px; align-items:flex-start;
    position:relative; overflow:hidden;
  }
  .ov-card::after{
    content:""; position:absolute; inset:0; opacity:0; transition:opacity .2s;
    background:radial-gradient(160px 100px at 0% 0%, var(--glow, transparent), transparent 70%);
  }
  .ov-card:hover{transform:translateY(-3px); border-color:var(--line-strong);}
  .ov-card:hover::after{opacity:1;}
  .ov-letter{
    width:42px; height:42px; border-radius:10px; flex-shrink:0;
    display:flex; align-items:center; justify-content:center; color:#0b0e16;
    font-family:'IBM Plex Mono',monospace; font-weight:600; font-size:19px;
  }
  .ov-card[data-key="S"] .ov-letter{background:var(--S);} .ov-card[data-key="S"]{--glow:var(--S-soft);}
  .ov-card[data-key="O"] .ov-letter{background:var(--O);} .ov-card[data-key="O"]{--glow:var(--O-soft);}
  .ov-card[data-key="L"] .ov-letter{background:var(--L);} .ov-card[data-key="L"]{--glow:var(--L-soft);}
  .ov-card[data-key="I"] .ov-letter{background:var(--I);} .ov-card[data-key="I"]{--glow:var(--I-soft);}
  .ov-card[data-key="D"] .ov-letter{background:var(--D);} .ov-card[data-key="D"]{--glow:var(--D-soft);}
  .ov-title{font-size:14.5px; font-weight:600; margin:0 0 3px; color:var(--ink);}
  .ov-sub{font-size:12.5px; color:var(--ink-faint); margin:0 0 6px; font-family:'IBM Plex Mono',monospace;}
  .ov-desc{font-size:12.5px; color:var(--ink-soft); margin:0; line-height:1.55;}

  /* principle view */
  .p-head{display:flex; align-items:center; gap:18px; margin-bottom:6px;}
  .p-letter-big{
    font-family:'IBM Plex Mono',monospace; font-weight:600; font-size:32px;
    width:60px; height:60px; border-radius:14px; color:#0b0e16;
    display:flex; align-items:center; justify-content:center; flex-shrink:0;
  }
  .p-titles h1{margin:0 0 3px; font-size:30px;}
  .p-acronym{font-family:'IBM Plex Mono',monospace; font-size:12px; color:var(--ink-faint); letter-spacing:.04em;}

  .p-quote{
    font-family:'Fraunces',serif; font-size:20px; line-height:1.55; font-weight:600;
    margin:28px 0 36px; padding:20px 24px; border-radius:4px 14px 14px 4px;
    border-left:3px solid var(--accent, var(--ink));
    background:var(--accent-soft, var(--bg-raised));
    color:var(--ink);
  }

  section.block{margin-bottom:36px; position:relative;}
  .block-label{
    display:flex; align-items:center; gap:8px;
    font-family:'IBM Plex Mono',monospace; font-size:11px; letter-spacing:.1em; text-transform:uppercase;
    color:var(--accent, var(--ink-faint)); margin:0 0 12px; font-weight:600;
  }
  .block-label::before{
    content:""; width:14px; height:1px; background:var(--accent, var(--ink-faint));
  }
  .block p{font-size:15px; line-height:1.8; color:var(--ink-soft); margin:0 0 10px;}

  .everyday-box{
    background:var(--bg-raised); border:1px solid var(--line); border-radius:16px;
    padding:20px 22px; display:flex; gap:20px; align-items:center;
    position:relative;
  }
  .everyday-illustration{width:88px; height:88px; flex-shrink:0;}
  .everyday-box p{margin:0; color:var(--ink); font-size:14.5px; line-height:1.7;}

  .code-tabs{display:flex; gap:6px;}
  .code-tab{
    font-family:'IBM Plex Mono',monospace; font-size:11.5px; padding:7px 14px;
    background:var(--bg-raised); border:1px solid var(--line); border-bottom:none;
    border-radius:8px 8px 0 0; color:var(--ink-faint); cursor:pointer;
    transition:background .15s, color .15s;
  }
  .code-tab:hover{color:var(--ink-soft);}
  .code-tab.active{background:var(--code-bg); color:var(--code-text); border-color:var(--line);}

  .code-block{display:flex; background:var(--code-bg); border:1px solid var(--line); border-radius:0 12px 12px 12px; overflow:hidden; margin-bottom:12px;}
  .code-block .code-lines{
    padding:18px 0; font-family:'IBM Plex Mono',monospace;
    font-size:12.8px; line-height:1.72; color:var(--syn-cm);
    user-select:none; text-align:right; min-width:44px;
    border-right:1px solid var(--line); background:rgba(0,0,0,.22);
    overflow:hidden;
  }
  .code-block .code-lines span{display:block; padding:0 14px 0 10px; height:1.72em;}
  .code-block .code-lines span:nth-child(5n){color:var(--ink-faint);}
  pre.code{
    background:transparent; color:var(--code-text); border:none;
    border-radius:0; padding:18px 20px; overflow-x:auto;
    font-family:'IBM Plex Mono',monospace; font-size:12.8px; line-height:1.72; margin:0; flex:1;
    white-space:pre;
  }
  pre.code .line{display:block; height:1.72em;}
  pre.code .c{color:var(--syn-cm); font-style:normal;}
  pre.code .k{color:var(--syn-kw);}
  pre.code .s{color:var(--syn-str);}
  pre.code .f{color:var(--syn-fn);}
  pre.code .t{color:var(--syn-type);}
  pre.code .n{color:var(--syn-num);}
  pre.code .d{color:var(--syn-type); opacity:.8;}

  .verdict{display:flex; gap:10px; margin-top:12px;}
  .verdict-col{flex:1; border-radius:10px; padding:13px 15px; font-size:12.5px; line-height:1.6; border:1px solid;}
  .verdict-bad{background:rgba(255,92,92,.08); border-color:rgba(255,92,92,.25); color:#ff9d9d;}
  .verdict-good{background:rgba(47,214,160,.08); border-color:rgba(47,214,160,.3); color:#7fe8c6;}
  .verdict-col b{display:block; font-size:11px; text-transform:uppercase; letter-spacing:.06em; margin-bottom:4px; font-family:'IBM Plex Mono',monospace;}

  .pager{display:flex; justify-content:space-between; gap:12px; margin-top:50px; padding-top:24px; border-top:1px solid var(--line);}
  .pager-btn{
    font-family:'Inter',sans-serif; font-size:13.5px; color:var(--ink-soft);
    background:var(--bg-raised); border:1px solid var(--line); border-radius:12px;
    padding:12px 18px; cursor:pointer; display:flex; flex-direction:column; gap:2px;
    transition:border-color .15s;
  }
  .pager-btn:hover{border-color:var(--line-strong);}
  .pager-btn small{font-family:'IBM Plex Mono',monospace; font-size:10px; color:var(--ink-faint); text-transform:uppercase; letter-spacing:.06em;}
  .ask-more{
    margin-top:14px; font-size:12.5px; color:var(--accent, var(--S)); cursor:pointer; display:inline-flex; align-items:center; gap:5px;
    transition:opacity .15s;
  }
  .ask-more:hover{opacity:.75;}

  /* ---------- nav map (breadcrumb + dots) ---------- */
  .nav-map{margin-bottom:30px;}
  .breadcrumb{
    display:flex; align-items:center; gap:8px; margin-bottom:16px;
    font-size:12.5px; color:var(--ink-faint);
  }
  .breadcrumb-link{color:var(--ink-soft); cursor:pointer; transition:color .15s;}
  .breadcrumb-link:hover{color:var(--ink); text-decoration:underline; text-underline-offset:3px;}
  .breadcrumb-sep{color:var(--ink-faint); opacity:.5;}
  .breadcrumb-current{color:var(--ink); font-weight:500;}

  .prg-dots{display:flex; align-items:center; gap:2px; flex-wrap:wrap;}
  .prg-dot{
    font-family:'IBM Plex Mono',monospace; font-weight:600; font-size:12px;
    width:34px; height:34px; border-radius:50%; cursor:pointer; border:2px solid var(--line);
    background:var(--bg-raised); color:var(--ink-faint);
    display:flex; align-items:center; justify-content:center;
    transition:all .2s cubic-bezier(.2,.8,.2,1);
    position:relative;
  }
  .prg-dot:hover{background:var(--bg-raised-2); border-color:var(--line-strong); color:var(--ink-soft);}
  .prg-dot.active{background:var(--dot-color, var(--ink)) !important; color:#0b0e16; border-color:var(--dot-color, var(--ink)) !important; transform:scale(1.15); box-shadow:0 0 14px var(--dot-glow, transparent);}
  .prg-line{width:20px; height:2px; background:var(--line); border-radius:1px; flex-shrink:0;}
  .prg-line.past{background:var(--dot-color, var(--line-strong));}
  .prg-label{
    font-family:'IBM Plex Mono',monospace; font-size:10.5px; color:var(--ink-faint);
    text-transform:uppercase; letter-spacing:.05em; margin-left:8px;
  }

  /* ---------- mini-map ---------- */
  .mini-map-btn{
    position:fixed; bottom:26px; right:26px; z-index:100;
    width:44px; height:44px; border-radius:12px; cursor:pointer; border:1px solid var(--line);
    background:var(--bg-raised-2); color:var(--ink-soft);
    display:flex; align-items:center; justify-content:center;
    transition:all .2s; backdrop-filter:blur(10px);
  }
  .mini-map-btn:hover{background:var(--bg-raised); border-color:var(--line-strong); color:var(--ink);}
  .mini-map-btn svg{width:20px; height:20px;}
  .mini-map-panel{
    position:fixed; bottom:82px; right:26px; z-index:100;
    background:var(--bg-raised-2); border:1px solid var(--line-strong); border-radius:16px;
    padding:20px 24px; backdrop-filter:blur(16px); box-shadow:0 16px 48px rgba(0,0,0,.5);
    display:none; flex-direction:column; gap:16px; min-width:200px;
    animation:rise .25s cubic-bezier(.2,.8,.2,1) both;
  }
  .mini-map-panel.open{display:flex;}
  .mini-map-panel .mm-title{
    font-family:'IBM Plex Mono',monospace; font-size:10.5px; letter-spacing:.1em;
    text-transform:uppercase; color:var(--ink-faint);
  }
  .mini-map-panel .mm-row{display:flex; align-items:center; gap:10px; cursor:pointer; padding:6px 10px; border-radius:8px; transition:background .15s; border:1px solid transparent;}
  .mini-map-panel .mm-row:hover{background:rgba(255,255,255,.04);}
  .mini-map-panel .mm-row.active{background:var(--mm-bg, var(--bg-raised)); border-color:var(--mm-color, var(--line));}
  .mini-map-panel .mm-dot{width:8px; height:8px; border-radius:50%; flex-shrink:0;}
  .mini-map-panel .mm-row.active .mm-dot{box-shadow:0 0 8px var(--mm-color);}
  .mini-map-panel .mm-name{font-size:13px; color:var(--ink-soft);}
  .mini-map-panel .mm-row.active .mm-name{color:var(--ink);}
  .mini-map-panel .mm-key{font-family:'IBM Plex Mono',monospace; font-size:11px; color:var(--ink-faint); margin-left:auto;}
  .mini-map-overlay{position:fixed; inset:0; z-index:99; display:none;}
  .mini-map-overlay.open{display:block;}
  @media (max-width:820px){ .mini-map-btn{bottom:16px; right:16px;} .mini-map-panel{bottom:70px; right:16px;} }
</style>
</head>
<body>
<div class="app">
  <aside class="sidebar">
    <div>
      <div class="brand-row">
        <div class="brand-mark"></div>
        <p class="brand">SOLID</p>
      </div>
      <p class="brand-sub">Guía de referencia</p>
    </div>
    <nav class="nav-group">
      <button class="nav-item" data-key="overview"><span class="nav-letter">·</span>Panorama general</button>
    </nav>
    <div class="nav-group">
      <p class="nav-label">Los cinco principios</p>
      <button class="nav-item" data-key="S"><span class="nav-letter">S</span>Responsabilidad única</button>
      <button class="nav-item" data-key="O"><span class="nav-letter">O</span>Abierto/cerrado</button>
      <button class="nav-item" data-key="L"><span class="nav-letter">L</span>Sustitución de Liskov</button>
      <button class="nav-item" data-key="I"><span class="nav-letter">I</span>Segregación de interfaces</button>
      <button class="nav-item" data-key="D"><span class="nav-letter">D</span>Inversión de dependencias</button>
    </div>
    <div class="sidebar-footer">
      <kbd>←</kbd> <kbd>→</kbd> moverte entre secciones<br>
      <kbd>M</kbd> abrir mapa de navegación
    </div>
  </aside>

  <main id="main"></main>

  <div class="mini-map-overlay" id="mmOverlay" onclick="toggleMiniMap()"></div>
  <button class="mini-map-btn" id="mmBtn" onclick="toggleMiniMap()" title="Mapa de navegación (M)">
    <svg viewBox="0 0 20 20" fill="none"><circle cx="5" cy="5" r="2.5" fill="var(--S)"/><circle cx="10" cy="15" r="2.5" fill="var(--O)"/><circle cx="15" cy="10" r="2.5" fill="var(--L)"/><path d="M7 6.5l2 7.5M12 14l2-3" stroke="var(--ink-faint)" stroke-width="1.2"/></svg>
  </button>
  <div class="mini-map-panel" id="mmPanel">
    <span class="mm-title">Mapa de navegación</span>
    <div class="mm-row" data-mm="overview" onclick="goTo('overview');toggleMiniMap()">
      <span class="mm-dot" style="background:var(--ink)"></span><span class="mm-name">Panorama general</span>
    </div>
  </div>
</div>

<script>
const ICONS = {

function escapeHtml(str){
  return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

const CODE_TOKEN = new RegExp(
  [
    '(#.*$)',
    '(//.*$)',
    '("(?:[^"\\\\]|\\\\.)*"|\'(?:[^\'\\\\]|\\\\.)*\'|`(?:[^`\\\\]|\\\\.)*`)',
    '\\b(\\d+(?:\\.\\d+)?)\\b',
    '(@\\w+)',
    '\\b(def|function)\\s+(\\w+)\\b',
    '(\\b(?:class|return|from|import|abstractmethod|raise|pass|constructor|interface|extends|implements|private|throw|new|const|self|this|let|var|if|elif|else|for|while|async|await|yield|static|public|protected|readonly|void|number|string|boolean|true|false|null|undefined|None|True|False|not|and|or|is|in|print|lambda)\\b)'
  ].join('|'), 'gm'
);

function highlight(code){
  const escaped = escapeHtml(code);
  return escaped.replace(CODE_TOKEN, (match, comment1, comment2, str, num, decorator, fnKw, fnName, kw) => {
    if (comment1 || comment2) return `<span class="c">${match}</span>`;
    if (str) return `<span class="s">${match}</span>`;
    if (decorator) return `<span class="d">${match}</span>`;
    if (num) return `<span class="n">${match}</span>`;
    if (fnKw) return `<span class="f">${match}</span>`;
    if (kw) return `<span class="k">${match}</span>`;
    return match;
  });
}

function renderCodeBlock(codeHtml){
  const lines = codeHtml.split('\n');
  const lineNums = lines.map((_, i) => `<span>${i + 1}</span>`).join('');
  const wrapped = lines.map(l => `<span class="line">${l || ' '}</span>`).join('');
  return `<div class="code-block">
    <div class="code-lines">${lineNums}</div>
    <pre class="code"><code>${wrapped}</code></pre>
  </div>`;
}

        <span class="breadcrumb-sep">›</span>
        <span class="breadcrumb-current">${d.name}</span>
        <span style="margin-left:6px;font-family:'IBM Plex Mono',monospace;font-size:10.5px;color:var(--ink-faint)">(${idx} / ${total})</span>
      </div>
      <div class="prg-dots">
        ${principles.map((k, i) => {
          const kIdx = ORDER.indexOf(k);
          const past = idx >= kIdx;
          const sep = i > 0 ? `<span class="prg-line${past ? ' past' : ''}" style="${past ? '--dot-color:' + DATA[principles[i-1]].color : ''}"></span>` : '';
          return `${sep}<button class="prg-dot${k === key ? ' active' : ''}" onclick="goTo('${k}')" style="--dot-color:${DATA[k].color};--dot-glow:${DATA[k].soft}" title="${DATA[k].name}">${k}</button>`;
        }).join('')}
        <span class="prg-label">${d.eng}</span>
      </div>
    </div>
  `;
}

function renderPrinciple(key){
  const d = DATA[key];
  const idx = ORDER.indexOf(key);
  const prev = ORDER[idx-1], next = ORDER[idx+1];
  const lang = state.codeLang;
  const codeBad = highlight(d.code[lang].bad);
  const codeGood = highlight(d.code[lang].good);

  return `
    <div style="--accent:${d.color}; --accent-soft:${d.soft}">
      ${renderNavMap(key)}

      <div class="p-head">
        <div class="p-letter-big" style="background:${d.color}">${key}</div>
        <div class="p-titles">
          <h1>${d.name}</h1>
          <p class="p-acronym">${d.eng}</p>
        </div>
      </div>

      <p class="p-quote">${d.quote}</p>

      <section class="block">
        <p class="block-label">Definición formal</p>
        <p>${d.formal}</p>
      </section>

      <section class="block">
        <p class="block-label">En palabras simples</p>
        <p>${d.simple}</p>
      </section>

      <section class="block">
        <p class="block-label">Ejemplo cotidiano</p>
        <div class="everyday-box">
          <div class="everyday-illustration">${ICONS[key]}</div>
          <p>${d.everyday}</p>
        </div>
      </section>

      <section class="block">
        <p class="block-label">Ejemplo de código</p>
        <div class="code-tabs">
          <button class="code-tab ${lang==='python'?'active':''}" onclick="setLang('python')">Python</button>
          <button class="code-tab ${lang==='typescript'?'active':''}" onclick="setLang('typescript')">TypeScript</button>
        </div>
        ${renderCodeBlock(codeBad)}
        <div class="verdict">
          <div class="verdict-col verdict-bad"><b>${d.badTitle}</b>${d.badText}</div>
        </div>
        <div style="height:16px"></div>
        ${renderCodeBlock(codeGood)}
        <div class="verdict">
          <div class="verdict-col verdict-good"><b>${d.goodTitle}</b>${d.goodText}</div>
        </div>
      </section>

      <div class="pager">
        ${prev ? `<div class="pager-btn" onclick="goTo('${prev}')"><small>Anterior</small>${prev === 'overview' ? 'Panorama general' : DATA[prev].name}</div>` : `<div></div>`}
        ${next ? `<div class="pager-btn" style="text-align:right" onclick="goTo('${next}')"><small>Siguiente</small>${DATA[next].name}</div>` : `<div></div>`}
      </div>
    </div>
  `;
}

function render(scrollTop){
  main.innerHTML = state.view === "overview" ? renderOverview() : renderPrinciple(state.view);
  document.querySelectorAll('.nav-item').forEach(el=>{
    el.classList.toggle('active', el.dataset.key === state.view);
  });
  document.querySelectorAll('.mm-row').forEach(el=>{
    el.classList.toggle('active', el.dataset.mm === state.view);
  });
  if (scrollTop) window.scrollTo({top:0, behavior:'instant'});
}

function goTo(key){
  state.view = key;
  render(true);
}
function setLang(lang){
  const y = window.scrollY;
  state.codeLang = lang;
  render(false);
  window.scrollTo({top:y, behavior:'instant'});
}

document.querySelectorAll('.nav-item').forEach(el=>{
  el.addEventListener('click', ()=> goTo(el.dataset.key));
});

document.addEventListener('keydown', (e)=>{
  if(state.mmOpen && e.key === 'Escape'){ toggleMiniMap(); return; }
  if(e.key === 'm' && !e.ctrlKey && !e.metaKey && !e.altKey && document.activeElement === document.body){ toggleMiniMap(); return; }
  const idx = ORDER.indexOf(state.view);
  if(e.key === 'ArrowRight' && idx < ORDER.length-1){ goTo(ORDER[idx+1]); }
  if(e.key === 'ArrowLeft' && idx > 0){ goTo(ORDER[idx-1]); }
});

render(true);
</script>
</body>
</html>
